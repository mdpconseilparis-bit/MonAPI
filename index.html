<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonAPI - Gestion Factures</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        input, select, button { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 10px; text-align: left; border: 1px solid #ddd; }
        th { background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MonAPI - Gestion Factures</h1>
        
        <div class="section">
            <h2>Ajouter un Client</h2>
            <input type="text" id="nomClient" placeholder="Nom">
            <input type="text" id="adresseClient" placeholder="Adresse">
            <input type="text" id="telClient" placeholder="Téléphone">
            <input type="email" id="emailClient" placeholder="Email">
            <button onclick="addClient()">Ajouter Client</button>
        </div>

        <div class="section">
            <h2>Clients</h2>
            <table id="clientsTable">
                <tr><th>ID</th><th>Nom</th><th>Adresse</th><th>Téléphone</th><th>Email</th></tr>
            </table>
        </div>

        <div class="section">
            <h2>Ajouter un Fournisseur</h2>
